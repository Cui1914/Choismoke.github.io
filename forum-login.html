<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 | 烟灰缸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="forum">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html">Choismoke</a>
        <nav class="nav">
          <a class="nav-link" href="index.html">首页</a>
          <a class="nav-link" href="portfolio.html">作品</a>
          <a class="nav-link" href="life.html">生活</a>
          <a class="nav-link" href="forum.html">烟灰缸</a>
          <a class="nav-link" href="about.html">关于</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="auth-shell">
        <article class="panel auth-card reveal">
          <div class="section-head">
            <div class="eyebrow">Sign In</div>
            <h1>登录烟灰缸</h1>
            <p>当前是前端预览。后续会接入真实邮箱登录、会话和通知系统。</p>
          </div>

          <form class="form-grid">
            <div class="field">
              <label for="login-email">邮箱</label>
              <input id="login-email" type="email" placeholder="you@example.com" />
              <div class="hint">会校验邮箱格式，并给出常见后缀提示。</div>
            </div>
            <div class="field">
              <label for="login-password">密码</label>
              <input id="login-password" type="password" placeholder="输入密码" />
            </div>
            <div class="hero-actions" style="margin-top: 4px">
              <a class="btn primary" href="forum-profile.html">登录预览</a>
              <a class="btn" href="forum-register.html">没有账号，去注册</a>
            </div>
          </form>
        </article>
      </div>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
