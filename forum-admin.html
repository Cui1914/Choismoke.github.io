<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台预览 | 烟灰缸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="forum">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html">Choismoke</a>
        <nav class="nav">
          <a class="nav-link" href="index.html">首页</a>
          <a class="nav-link" href="portfolio.html">作品</a>
          <a class="nav-link" href="life.html">生活</a>
          <a class="nav-link" href="forum.html">烟灰缸</a>
          <a class="nav-link" href="about.html">关于</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container content-stack">
        <div class="section-head reveal">
          <div class="eyebrow">Admin Preview</div>
          <h1>烟灰缸后台</h1>
          <p>这里预留用户管理、举报处理、公告发布、分类管理和基础统计。</p>
        </div>

        <section class="stat-grid reveal">
          <article class="stat-card">
            <strong>1,248</strong>
            累计用户
          </article>
          <article class="stat-card">
            <strong>386</strong>
            累计帖子
          </article>
          <article class="stat-card">
            <strong>27</strong>
            待处理举报
          </article>
          <article class="stat-card">
            <strong>5</strong>
            待审核封禁
          </article>
        </section>

        <section class="admin-table reveal">
          <div class="panel-header">
            <h2>最新举报</h2>
            <a class="btn" href="#">发布公告</a>
          </div>
          <div class="admin-row">
            <strong>帖子：某条争议内容</strong>
            <span>原因：感到不适</span>
            <span>状态：已隐藏</span>
            <span>操作：处理</span>
          </div>
          <div class="admin-row">
            <strong>用户：QuietLoop</strong>
            <span>原因：内容不实</span>
            <span>状态：待确认</span>
            <span>操作：查看</span>
          </div>
          <div class="admin-row">
            <strong>评论：某条回复</strong>
            <span>原因：感到不适</span>
            <span>状态：已隐藏</span>
            <span>操作：恢复</span>
          </div>
        </section>
      </div>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
